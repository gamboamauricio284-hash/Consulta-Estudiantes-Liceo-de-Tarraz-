<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Consulta de estudiantes</title>

<style>

body{
font-family:Arial;
margin:40px;
background:#f4f6fb;
}

h1{
color:#1d3557;
}

input{
width:100%;
padding:12px;
font-size:16px;
margin-bottom:20px;
}

.card{
background:white;
padding:15px;
margin-bottom:15px;
border-radius:8px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

</style>
</head>

<body>

<h1>Consulta de estudiantes</h1>

<input id="buscar" placeholder="Buscar estudiante...">

<div id="resultados"></div>

<script>

const estudiantes = [

{
nombre:"Ana Pérez",
seccion:"10-2",
procedencia:"San Pablo",
encargado:"María Pérez",
telefono:"8888-0000",
estado:"Seguimiento",
transporte:"Ruta 3"
},

{
nombre:"Luis Rodríguez",
seccion:"11-1",
procedencia:"San Marcos",
encargado:"Carlos Rodríguez",
telefono:"8777-1111",
estado:"Al día",
transporte:"No usa ruta"
}

];

function buscar(){

let texto = document.getElementById("buscar").value.toLowerCase();

let salida="";

estudiantes.forEach(e=>{

if(e.nombre.toLowerCase().includes(texto)){

salida+=`

<div class="card">

<b>${e.nombre}</b><br>

Sección: ${e.seccion}<br>
Procedencia: ${e.procedencia}<br>
Encargado: ${e.encargado}<br>
Teléfono: ${e.telefono}<br>
Estado: ${e.estado}<br>
Transporte: ${e.transporte}

</div>

`;

}

});

document.getElementById("resultados").innerHTML=salida;

}

document.getElementById("buscar").addEventListener("input",buscar);

</script>

</body>
</html>
